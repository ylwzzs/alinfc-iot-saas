name: Bug 报告
description: 报告一个 Bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 描述遇到的问题
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现这个 Bug
      placeholder: "1. 进入页面\n2. 点击按钮\n3. 出现错误"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: 浏览器、操作系统等
      placeholder: "浏览器: Chrome 120\n操作系统: macOS 14"

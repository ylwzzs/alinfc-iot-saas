name: 功能需求
description: 提出新的功能需求
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 需求描述
      description: 详细描述你想要的功能
      placeholder: "作为一个用户，我希望..."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P0 (紧急)
        - P1 (高)
        - P2 (中)
        - P3 (低)
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 如何验证这个功能已经完成
      placeholder: "- [ ] 功能可以正常使用\n- [ ] 测试通过"

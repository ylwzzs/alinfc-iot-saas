name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ==================== 代码检查 ====================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd web && npm ci

      - name: Check code formatting
        run: npm run format:check
        continue-on-error: true

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: TypeScript Check
        run: cd web && npx tsc --noEmit
        continue-on-error: true

  # ==================== 单元测试 ====================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd cloud && npm ci
          cd ../web && npm ci

      - name: Run Tests
        run: npm run test

      - name: Generate Coverage Report
        run: cd web && npm run test:coverage
        continue-on-error: true

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        with:
          files: ./web/coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  # ==================== E2E 测试 ====================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: cd web && npm ci

      - name: Install Playwright Browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Run E2E Smoke Tests
        run: cd web && npm run test:e2e:smoke || true
        env:
          E2E_BASE_URL: ${{ github.event_name == 'pull_request' && format('https://{0}', github.event.pull_request.number) || 'https://alinfc.vercel.app' }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ==================== PR 预览部署 ====================
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    outputs:
      preview-url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: |
          npm ci
          cd web && npm ci
          cd ../api && npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ==================== Preview 部署通知 ====================
  notify-preview:
    name: Notify Preview Deploy
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    if: success() && github.event_name == 'pull_request'
    steps:
      - name: Send WeWork Notification
        run: |
          PREVIEW_URL="${{ needs.deploy-preview.outputs.preview-url }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          BRANCH="${{ github.head_ref }}"
          REPO="${{ github.repository }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"
          WIKI_URL="https://rcn1ylkh31jd.feishu.cn/wiki/Q8RwwApZYi2rjmkjKW4cSjOLnNb"

          curl -s -X POST "${{ secrets.WEWORK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "content": "'"## 🔗 支付宝 IoT SaaS 预览环境部署\n\n**PR**: #${PR_NUMBER} ${PR_TITLE}\n**分支**: ${BRANCH}\n**作者**: ${PR_AUTHOR}\n\n**预览地址**: [${PREVIEW_URL}](${PREVIEW_URL})\n\n[查看 PR](${PR_URL})\n[查看构建详情](${RUN_URL})\n[飞书文档](${WIKI_URL})"'"
              }
            }'

  # ==================== 开发环境部署 ====================
  deploy-develop:
    name: Deploy Develop
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: |
          npm ci
          cd web && npm ci
          cd ../api && npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Develop)
        run: vercel --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ==================== 生产环境部署 ====================
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: |
          npm ci
          cd web && npm ci
          cd ../api && npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health Check
        run: |
          sleep 10
          curl -f https://alinfc.vercel.app/api/health || echo "Health check warning"

  # ==================== 安全扫描 ====================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        run: |
          npm audit --audit-level=high || true
          cd web && npm audit --audit-level=high || true

  # ==================== 生产部署通知 + 飞书联动 ====================
  notify:
    name: WeWork & Feishu Notification
    runs-on: ubuntu-latest
    needs: [lint, test, deploy-production]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "text=部署成功" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "text=部署失败" >> $GITHUB_OUTPUT
          fi

      - name: Get Feishu Token
        id: feishu
        if: ${{ secrets.FEISHU_APP_ID != '' && secrets.FEISHU_APP_SECRET != '' }}
        run: |
          RESPONSE=$(curl -s -X POST "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"${FEISHU_APP_ID}\",\"app_secret\":\"${FEISHU_APP_SECRET}\"}")
          TOKEN=$(echo "$RESPONSE" | jq -r '.tenant_access_token // empty')
          if [ -n "$TOKEN" ]; then
            echo "token=$TOKEN" >> $GITHUB_OUTPUT
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "Feishu auth failed: $RESPONSE"
          fi
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: Update Feishu Dev Log
        if: steps.feishu.outputs.has_token == 'true'
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS_EMOJI="${{ steps.status.outputs.emoji }}"
          TEST_RESULT="${{ needs.test.result == 'success' && '✅ 通过' || '❌ 失败' }}"
          TIMESTAMP=$(date +%s)000

          # 添加开发日志记录
          curl -s -X POST "https://open.feishu.cn/open-apis/bitable/v1/apps/CHjXbB4Gaa7rYusEGksc6tbBnHd/tables/tbld798dB4hjDTbY/records" \
            -H "Authorization: Bearer ${{ steps.feishu.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"fields\": {
                \"日期\": ${TIMESTAMP},
                \"开发内容\": \"${COMMIT_MSG%%$'\\n'*}\",
                \"变更文件\": \"待补充\",
                \"测试结果\": \"${TEST_RESULT}\",
                \"AI审核结果\": \"⏳ 待审核\",
                \"备注\": \"提交: ${SHORT_SHA} | 分支: ${BRANCH} | 作者: ${COMMIT_AUTHOR}\"
              }
            }" && echo "Feishu dev log updated" || echo "Feishu update skipped"

      - name: Send WeWork Notification
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"
          DEPLOY_URL="https://alinfc.vercel.app"
          STATUS_EMOJI="${{ steps.status.outputs.emoji }}"
          STATUS_TEXT="${{ steps.status.outputs.text }}"
          WIKI_URL="https://rcn1ylkh31jd.feishu.cn/wiki/Q8RwwApZYi2rjmkjKW4cSjOLnNb"

          curl -s -X POST "${{ secrets.WEWORK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "content": "'"## ${STATUS_EMOJI} 支付宝 IoT SaaS 生产部署\n\n**状态**: ${STATUS_TEXT}\n**分支**: ${BRANCH}\n**提交**: ${SHORT_SHA}\n**作者**: ${COMMIT_AUTHOR}\n**信息**: ${COMMIT_MSG%%$'\\n'*}\n\n[查看构建详情](${RUN_URL})\n[访问应用](${DEPLOY_URL})\n[飞书文档](${WIKI_URL})"'"
              }
            }'

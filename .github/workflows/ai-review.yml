name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Changes
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > pr_diff.txt || echo "No diff" > pr_diff.txt
          echo "changed_files=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files | length' 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
          echo "additions=$(gh pr view ${{ github.event.pull_request.number }} --json additions --jq '.additions' 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
          echo "deletions=$(gh pr view ${{ github.event.pull_request.number }} --json deletions --jq '.deletions' 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT

      - name: AI Code Review
        id: review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          BRANCH="${{ github.head_ref }}"
          DIFF=$(cat pr_diff.txt | head -1500)

          # 调用 GitHub Models API
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://models.github.ai/inference/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -d @- << 'ENDJSON'
          {
            "model": "openai/gpt-4o-mini",
            "messages": [
              {
                "role": "system",
                "content": "你是一位资深代码审核专家。请审核代码变更，分析：1.代码质量 2.潜在问题 3.安全风险 4.测试覆盖 5.改进建议。用中文回复，简洁清晰。"
              },
              {
                "role": "user",
                "content": "请审核 PR：\n标题: $PR_TITLE\n作者: $PR_AUTHOR\n分支: $BRANCH\n变更: ${{ steps.changes.outputs.changed_files }} 文件, +${{ steps.changes.outputs.additions }}/-${{ steps.changes.outputs.deletions }} 行\n\n代码:\n```\n$DIFF\n```"
              }
            ],
            "temperature": 0.3,
            "max_tokens": 1500
          }
          ENDJSON
          )

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "200" ]; then
            REVIEW=$(echo "$BODY" | jq -r '.choices[0].message.content')
          else
            REVIEW="AI审核暂时不可用 (HTTP $HTTP_CODE)，请手动审核。"
          fi

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > comment.md << EOF
          ## 🤖 AI 代码审核报告

          **审核时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          ---

          ${{ steps.review.outputs.review }}

          ---

          > 📝 AI 自动审核，仅供参考。
          EOF

          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md

      - name: Summary
        run: |
          echo "## AI 审核完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "- 变更文件: ${{ steps.changes.outputs.changed_files }}" >> $GITHUB_STEP_SUMMARY
          echo "- +${{ steps.changes.outputs.additions }}/-${{ steps.changes.outputs.deletions }}" >> $GITHUB_STEP_SUMMARY
